# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - safeviate

concurrency:
  group: safeviate-azure-webapp
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A6FA8B7BC76047969579C27B6DA2ED30 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83B5837B1C82421F9C7C19366F95782F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_472FC1469C54499492D0E576AB651E32 }}

      - name: 'Deploy to Azure Web App (attempt 1)'
        id: deploy_to_webapp_attempt_1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'safeviate'
          slot-name: 'Production'
          package: .

      - name: Wait before retry 2
        if: steps.deploy_to_webapp_attempt_1.outcome != 'success'
        run: sleep 30

      - name: 'Deploy to Azure Web App (attempt 2)'
        id: deploy_to_webapp_attempt_2
        if: steps.deploy_to_webapp_attempt_1.outcome != 'success'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'safeviate'
          slot-name: 'Production'
          package: .

      - name: Wait before retry 3
        if: steps.deploy_to_webapp_attempt_1.outcome != 'success' && steps.deploy_to_webapp_attempt_2.outcome != 'success'
        run: sleep 30

      - name: 'Deploy to Azure Web App (attempt 3)'
        id: deploy_to_webapp_attempt_3
        if: steps.deploy_to_webapp_attempt_1.outcome != 'success' && steps.deploy_to_webapp_attempt_2.outcome != 'success'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'safeviate'
          slot-name: 'Production'
          package: .

      - name: Fail if Azure deployment still failed
        if: steps.deploy_to_webapp_attempt_1.outcome != 'success' && steps.deploy_to_webapp_attempt_2.outcome != 'success' && steps.deploy_to_webapp_attempt_3.outcome != 'success'
        run: exit 1
          
