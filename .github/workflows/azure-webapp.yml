name: Build and deploy Next.js app to Azure Web App
# Azure CI trigger refresh 10

concurrency:
  group: safeviate-azure-webapp
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
      NEXT_PUBLIC_BUILD_TIME: ${{ github.run_id }}-${{ github.run_attempt }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'src/**', 'prisma/**', 'public/**', 'next.config.ts', 'tailwind.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Build Next.js app
        run: npm run build

      - name: Login to Azure for app config cleanup
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A6FA8B7BC76047969579C27B6DA2ED30 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83B5837B1C82421F9C7C19366F95782F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_472FC1469C54499492D0E576AB651E32 }}

      - name: Validate Azure deployment settings
        run: |
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "Missing AZURE_RESOURCE_GROUP GitHub secret."
            exit 1
          fi

      - name: Clear run-from-package override
        run: |
          az webapp config appsettings delete \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name safeviate \
            --setting-names WEBSITE_RUN_FROM_PACKAGE SCM_DO_BUILD_DURING_DEPLOYMENT || true
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name safeviate \
            --startup-file ""

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy_attempt_1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: safeviate
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Wait before retry 2
        if: steps.deploy_attempt_1.outcome != 'success'
        run: sleep 30

      - name: Deploy to Azure Web App (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome != 'success'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: safeviate
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Wait before retry 3
        if: steps.deploy_attempt_1.outcome != 'success' && steps.deploy_attempt_2.outcome != 'success'
        run: sleep 30

      - name: Deploy to Azure Web App (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome != 'success' && steps.deploy_attempt_2.outcome != 'success'
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: safeviate
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Fail if Azure deployment still failed
        if: steps.deploy_attempt_1.outcome != 'success' && steps.deploy_attempt_2.outcome != 'success' && steps.deploy_attempt_3.outcome != 'success'
        run: exit 1
