name: Build and deploy Next.js app to Azure Web App
# Azure CI trigger refresh 10

concurrency:
  group: safeviate-azure-webapp
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
      NEXT_PUBLIC_BUILD_TIME: ${{ github.run_id }}-${{ github.run_attempt }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      AZURE_STORAGE_CONTAINER_NAME: ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'src/**', 'prisma/**', 'public/**', 'next.config.ts', 'tailwind.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Build Next.js app
        run: npm run build

      - name: Package standalone web app
        run: |
          rm -rf deploy release.zip
          mkdir -p deploy
          cp -R .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/
          if [ -d public ]; then
            cp -R public deploy/public
          fi
          cd deploy
          zip -r ../release.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A6FA8B7BC76047969579C27B6DA2ED30 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83B5837B1C82421F9C7C19366F95782F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_472FC1469C54499492D0E576AB651E32 }}

      - name: Resolve Azure resource group
        run: |
          echo "AZURE_RESOURCE_GROUP=$(az webapp show --name safeviate --query resourceGroup -o tsv)" >> "$GITHUB_ENV"

      - name: Configure App Service for package deployment
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name safeviate \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name safeviate \
            --startup-file "node server.js"

      - name: Deploy ZIP package to Azure Web App
        run: |
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name safeviate \
            --src-path release.zip
